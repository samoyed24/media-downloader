services:
  flask-app:
    build: .
    container_name: mukaku-web
    ports:
      - "${WEB_PORT:-5001}:5000"
    environment:
      # Jellyfin 配置
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME:-admin}
      - JELLYFIN_PASSWORD=${JELLYFIN_PASSWORD}
      # 路径配置（容器内路径）
      - DOWNLOAD_DIR=/downloads
      - MEDIA_DIR=/media
      - MOVIE_LIBRARY_PATH=/media/movies
      - TV_LIBRARY_PATH=/media/tvshows
    volumes:
      - ${DOWNLOAD_PATH:-./downloads}:/downloads
      - ${DATA_PATH:-./data}:/app/data
      - ${MEDIA_PATH:-./media}:/media
    depends_on:
      - jellyfin
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - ${JELLYFIN_CONFIG_PATH:-./jellyfin_config}:/config
      - ${MEDIA_PATH:-./media}:/media
    restart: unless-stopped
